name: Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - win32-x64
          - darwin-x64
          - darwin-arm64
          - linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download JJ binary for ${{ matrix.target }}
        run: npm run download-jj
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
          JJ_VERSION: ${{ github.event.inputs.jj_version || '' }}

      - name: Package Extension for ${{ matrix.target }}
        run: npm run package:${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: dist/*.vsix
          retention-days: 30

      - name: List dist directory
        run: ls -la dist/
        shell: bash
