name: Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
          - target: darwin-x64
            os: macos-13
          - target: darwin-arm64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download JJ binary
        run: npm run download-jj
        env:
          JJ_VERSION: ${{ github.event.inputs.jj_version || '' }}

      - name: Package Extension
        run: npm run package:${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: dist/*.vsix
          retention-days: 30

      - name: List dist directory
        run: ls -la dist/
        shell: bash
